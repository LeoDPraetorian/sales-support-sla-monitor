name: Sales-Support SLA Monitor

on:
  schedule:
    # This no longer drives the 5-min cadence — the job below SELF-LOOPS every
    # 5 min for ~5h45m. The schedule's only job is to RESTART that loop roughly
    # every few hours. GitHub throttles scheduled runs (often 1.5-5h late), but
    # restarting every ~6h is an easy bar, and concurrency hands off seamlessly.
    # Frequent kicks = a pending run is almost always queued when the loop ends.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without posting to Slack or writing Gmail labels"
        type: boolean
        default: false

concurrency:
  # Never let two runs overlap (would risk double-posting before labels land).
  group: sales-support-sla
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # just under GitHub's 6h job limit; the loop exits at ~5h45m
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run SLA monitor
        env:
          # --- Gmail auth: provide EITHER the service-account JSON ...
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # --- ... OR an OAuth refresh token trio:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          # --- Slack output (bot token preferred; webhook is a fallback):
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || 'C0B7P5LCRK7' }}
          SLACK_DM_USER_IDS: ${{ vars.SLACK_DM_USER_IDS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # --- Email->SMS gateway (optional):
          SMS_GATEWAY: ${{ secrets.SMS_GATEWAY }}
          SMS_SCOPE: ${{ vars.SMS_SCOPE || 'breach' }}
          # --- Tuning (optional; defaults shown in sla_monitor.py):
          GMAIL_USER: ${{ vars.GMAIL_USER || 'me' }}
          SALES_SUPPORT_ADDRESS: ${{ vars.SALES_SUPPORT_ADDRESS || 'sales-support@praetorian.com' }}
          INTERNAL_DOMAINS: ${{ vars.INTERNAL_DOMAINS || 'praetorian.com' }}
          SLA_HOURS: ${{ vars.SLA_HOURS || '24' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # Self-looping runner: polls every 5 min for ~5h45m, entirely on GitHub
          # infra — no external trigger, no dependency on anyone's machine. When
          # this exits, the concurrency group lets a queued/scheduled run take over.
          END=$(( SECONDS + 20700 ))   # ~5h45m, safely under the 6h job limit
          i=0
          while [ "$SECONDS" -lt "$END" ]; do
            i=$(( i + 1 ))
            echo "::group::poll #$i — $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            python sla_monitor.py || echo "poll #$i errored; continuing"
            echo "::endgroup::"
            [ "$(( SECONDS + 300 ))" -ge "$END" ] && break
            sleep 300
          done
          echo "loop window complete after $i polls; exiting so the next run takes over"
